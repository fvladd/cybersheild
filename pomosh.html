<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помощь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f1e6 0%, #e8f4e8 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .feedback-container {
            max-width: 700px;
            margin: 0 auto;
            background-color: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e380e2;
        }

        .feedback-header {
            background: linear-gradient(135deg, rgba(0, 2, 49, 1) 0%, rgba(0, 2, 49, 1) 100%);
            padding: 30px;
            text-align: center;
            color: #fff4e4;
        }

        .feedback-header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .feedback-header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .emoji-large {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .feedback-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            color: rgba(0, 2, 49, 1);
            margin-bottom: 8px;
            font-size: 1em;
        }

        .required-star {
            color: #f44336;
            margin-left: 3px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            font-size: 1em;
            font-family: inherit;
            border: 2px solid rgba(0, 2, 49, 1);
            border-radius: 15px;
            transition: all 0.3s ease;
            background-color: #fff4e4;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #e08ed3;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #f9f5eb;
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .radio-option:hover {
            background-color: #e8f4e8;
        }

        .radio-option input {
            width: auto;
            margin: 0;
            transform: scale(1.1);
            cursor: pointer;
        }

        .radio-option label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, rgba(0, 2, 49, 1) 0%, rgba(0, 2, 49, 1) 100%);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .success-message {
            background-color: #e8f5e9;
            border: 2px solid rgba(0, 2, 49, 1);
            color: rgba(0, 2, 49, 1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .error-message {
            background-color: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
            font-size: 0.9em;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .feedback-footer {
            background-color: #f9f5eb;
            padding: 20px 40px;
            text-align: center;
            border-top: 1px solid #e8dcc8;
        }

        .feedback-footer p {
            color: rgba(0, 2, 49, 1);
            font-size: 0.9em;
        }

        .feedback-footer .phone {
            font-size: 1.2em;
            font-weight: bold;
            color: rgba(0, 2, 49, 1);
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .feedback-body {
                padding: 25px;
            }
            
            .feedback-header h1 {
                font-size: 1.8em;
            }
            
            .radio-group {
                flex-direction: column;
                gap: 10px;
            }
            
            .radio-option {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="feedback-container">
    <div class="feedback-header">
        <div class="emoji-large">🏠</div>
        <h1>Напишите нам</h1>
        <p>Задайте вопрос, поделитесь мнением или сообщите о проблеме</p>
    </div>

    <div class="feedback-body">
        <div id="successMessage" class="success-message">
            ✅ Спасибо за ваше сообщение!<br>
            Мы ответим вам в ближайшее время на указанную почту.
        </div>

        <form id="feedbackForm" action="https://formspree.io/f/anya.7araeva@yandex.ru" method="POST">
            <div class="form-group">
                <label>Ваше имя <span class="required-star">*</span></label>
                <input type="text" id="name" placeholder="Например: Иван Иванов" required>
            </div>

            <div class="form-group">
                <label>Email для ответа <span class="required-star">*</span></label>
                <input type="email" id="email" placeholder="Ваш email (на него придёт ответ)" required>
                <small style="color: rgba(0, 2, 49, 1); font-size: 0.8em;">Мы не передадим ваш email третьим лицам</small>
            </div>

            <div class="form-group">
                <label>Телефон (необязательно)</label>
                <input type="tel" id="phone" placeholder="+7 (___)-___-__-__">
            </div>

            <div class="form-group">
                <label>Тема обращения <span class="required-star">*</span></label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="topic" value="question" checked>
                        <span>📖 Вопрос по курсу</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="topic" value="problem">
                        <span>⚠️ Сообщить о проблеме</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="topic" value="suggestion">
                        <span>💡 Предложение</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="topic" value="other">
                        <span>📝 Другое</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Ваше сообщение <span class="required-star">*</span></label>
                <textarea id="message" placeholder="Напишите подробно, что вас беспокоит или что вы хотели бы узнать..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">📨 Отправить сообщение</button>

            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>

    <div class="feedback-footer">
        <p>📞 Или позвоните нам</p>
        <div class="phone">8-950-494-61-56</div>
        <p style="font-size: 0.8em; margin-top: 10px;">Звонок по России бесплатный<br>Пн-Пт с 9:00 до 18:00</p>
    </div>
</div>

<script>
    const form = document.getElementById('feedbackForm');
    const successMessage = document.getElementById('successMessage');
    const errorMessage = document.getElementById('errorMessage');

    function showError(text) {
        errorMessage.textContent = text;
        errorMessage.classList.add('show');
        setTimeout(() => {
            errorMessage.classList.remove('show');
        }, 5000);
    }

    function resetForm() {
        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('message').value = '';
        document.querySelector('input[name="topic"]').checked = true;
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const message = document.getElementById('message').value.trim();
        const topic = document.querySelector('input[name="topic"]:checked').value;
        const phone = document.getElementById('phone').value.trim();

        if (name === '') {
            showError('Пожалуйста, введите ваше имя');
            return;
        }

        if (email === '') {
            showError('Пожалуйста, введите email для ответа');
            return;
        }

        const emailRegex = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
        if (!emailRegex.test(email)) {
            showError('Пожалуйста, введите корректный email (например: name@mail.ru)');
            return;
        }

        if (message === '') {
            showError('Пожалуйста, напишите ваше сообщение');
            return;
        }

        let topicText = '';
        switch(topic) {
            case 'question': topicText = 'Вопрос по курсу'; break;
            case 'problem': topicText = 'Сообщение о проблеме'; break;
            case 'suggestion': topicText = 'Предложение'; break;
            default: topicText = 'Другое';
        }

        console.log('Отправлено сообщение:');
        console.log('Имя:', name);
        console.log('Email:', email);
        console.log('Телефон:', phone || 'не указан');
        console.log('Тема:', topicText);
        console.log('Сообщение:', message);

        successMessage.classList.add('show');

        resetForm();
        
        setTimeout(() => {
            successMessage.classList.remove('show');
        }, 5000);
    });
</script>

</body>
</html>
